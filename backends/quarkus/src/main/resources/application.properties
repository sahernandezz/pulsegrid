# =============================================================================
# PulseGrid · Quarkus — common config + per-profile (%reactive / %imperative).
# The Dockerfile sets quarkus.profile from PARADIGM, activating the right datasource.
# Health at /q/health, Prometheus metrics at /q/metrics (Quarkus defaults).
# =============================================================================
quarkus.http.port=${SERVER_PORT:8080}
quarkus.application.name=pulsegrid-quarkus

# --- Datasource (common credentials) ----------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:pulse}
quarkus.datasource.password=${DB_PASSWORD:pulse}

# --- REACTIVE profile: Vert.x reactive PG client ----------------------------
%reactive.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulsegrid}
%reactive.quarkus.datasource.reactive.max-size=64

# --- IMPERATIVE profile: JDBC + Hibernate ORM (schema comes from db/migrations) -
%imperative.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pulsegrid}
%imperative.quarkus.datasource.jdbc.max-size=64
%imperative.quarkus.hibernate-orm.database.generation=none
%imperative.quarkus.hibernate-orm.schema-management.strategy=none

# --- Observability ----------------------------------------------------------
quarkus.micrometer.export.prometheus.enabled=true

# --- PulseGrid (ingestion) --------------------------------------------------
pulsegrid.ingest-mode=${INGEST_MODE:http}
pulsegrid.kafka.bootstrap=${KAFKA_BOOTSTRAP:localhost:9092}
pulsegrid.kafka.topic=${KAFKA_TOPIC:metric-events}
